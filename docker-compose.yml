################################################################################
# PacketPulse DPI System — Kafka Event Backbone
#
# Services:
#   zookeeper      – ZooKeeper for Kafka coordination
#   kafka          – Single-node Kafka broker (port 9092)
#   kafka-init     – One-shot container that creates required topics
#
# Usage:
#   docker compose up -d
#   docker compose logs -f kafka-init   # confirm topic creation
################################################################################


services:
  # --------------------------------------------------------------------------
  # ZooKeeper
  # --------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: packetpulse-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Kafka Broker
  # --------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: packetpulse-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Listeners: PLAINTEXT for inter-container, HOST for host-machine access
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      # Disable automatic topic creation — topics are managed by kafka-init
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Redis Cache
  # --------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: packetpulse-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Topic Initializer (one-shot)
  # --------------------------------------------------------------------------
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: packetpulse-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo '=== PacketPulse Topic Initialization ==='

        BROKER="kafka:29092"

        echo '[1/3] Creating topic: raw_packets (partitions=4, retention=3600000ms)'
        kafka-topics --bootstrap-server $$BROKER \
          --create --if-not-exists \
          --topic raw_packets \
          --partitions 4 \
          --replication-factor 1 \
          --config retention.ms=3600000

        echo '[2/3] Creating topic: processed_packets (partitions=4)'
        kafka-topics --bootstrap-server $$BROKER \
          --create --if-not-exists \
          --topic processed_packets \
          --partitions 4 \
          --replication-factor 1

        echo '[3/4] Creating topic: alerts (partitions=2)'
        kafka-topics --bootstrap-server $$BROKER \
          --create --if-not-exists \
          --topic alerts \
          --partitions 2 \
          --replication-factor 1

        echo '[4/4] Creating topic: flow_stats (partitions=1)'
        kafka-topics --bootstrap-server $$BROKER \
          --create --if-not-exists \
          --topic flow_stats \
          --partitions 1 \
          --replication-factor 1

        echo ''
        echo '=== Topics created successfully ==='
        kafka-topics --bootstrap-server $$BROKER --list
    restart: "no"

  # --------------------------------------------------------------------------
  # Microservices
  # --------------------------------------------------------------------------
  packet_service:
    build: ./services/packet_service
    container_name: packetpulse-packet-service
    depends_on:
      kafka:
        condition: service_healthy
    network_mode: host # Needs to sniff host interface, maybe? 
    # Or just default Docker network depending on OS but let's stick to standard port mapping
    ports:
      - "8001:8001"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=localhost:9092 # Assuming host networking OR map it correctly 
      # Actually if it runs in docker network, it should be kafka:29092
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    restart: always

  processing_service:
    build: ./services/processing_service
    container_name: packetpulse-processing-service
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8002:8002"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    restart: always

  detection_service:
    build: ./services/detection_service
    container_name: packetpulse-detection-service
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8003:8003"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    restart: always

  api_gateway:
    build: ./services/api_gateway
    container_name: packetpulse-api-gateway
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    restart: always

volumes:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
