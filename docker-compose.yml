################################################################################
# PacketPulse DPI System — Complete Docker Setup
#
# Services:
#   zookeeper      – ZooKeeper for Kafka coordination
#   kafka          – Single-node Kafka broker (port 9092)
#   kafka-init     – One-shot container that creates required topics
#   redis          – Redis cache for real-time data
#   postgres        – PostgreSQL database
#   packet_service – C++ packet capture service
#   processing_service – Python packet processing service
#   detection_service – Python ML detection service
#   api_gateway    – FastAPI gateway service
#   dashboard      – React dashboard with nginx
#
# Usage:
#   make up    # docker compose up --build -d
#   make down  # docker compose down
#   make logs  # docker compose logs -f
################################################################################


services:
  # --------------------------------------------------------------------------
  # ZooKeeper
  # --------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: packetpulse-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    restart: unless-stopped
    networks:
      - internal

  # --------------------------------------------------------------------------
  # Kafka Broker
  # --------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: packetpulse-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - internal

  # --------------------------------------------------------------------------
  # Redis Cache
  # --------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: packetpulse-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # --------------------------------------------------------------------------
  # PostgreSQL Database
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: packetpulse-postgres
    environment:
      POSTGRES_DB: packetpulse
      POSTGRES_USER: pp
      POSTGRES_PASSWORD: pp_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pp"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # --------------------------------------------------------------------------
  # Topic Initializer (one-shot)
  # --------------------------------------------------------------------------
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: packetpulse-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo '=== PacketPulse Topic Initialization ==='

        BROKER="kafka:29092"

        echo '[1/4] Creating topic: raw_packets (partitions=4, retention=3600000ms)'
        kafka-topics --bootstrap-server $$BROKER \
          --create --if-not-exists \
          --topic raw_packets \
          --partitions 4 \
          --replication-factor 1 \
          --config retention.ms=3600000

        echo '[2/4] Creating topic: processed_packets (partitions=4)'
        kafka-topics --bootstrap-server $$BROKER \
          --create --if-not-exists \
          --topic processed_packets \
          --partitions 4 \
          --replication-factor 1

        echo '[3/4] Creating topic: alerts (partitions=2)'
        kafka-topics --bootstrap-server $$BROKER \
          --create --if-not-exists \
          --topic alerts \
          --partitions 2 \
          --replication-factor 1

        echo '[4/4] Creating topic: flow_stats (partitions=1)'
        kafka-topics --bootstrap-server $$BROKER \
          --create --if-not-exists \
          --topic flow_stats \
          --partitions 1 \
          --replication-factor 1

        echo ''
        echo '=== Topics created successfully ==='
        kafka-topics --bootstrap-server $$BROKER --list
    restart: "no"
    networks:
      - internal

  # --------------------------------------------------------------------------
  # Microservices
  # --------------------------------------------------------------------------
  packet_service:
    build: ./services/packet_service
    container_name: packetpulse-packet-service
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8001:8001"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC=raw_packets
      - REDIS_URL=redis://redis:6379/0
      - INTERFACE=eth0
    restart: unless-stopped
    networks:
      - internal

  processing_service:
    build: ./services/processing_service
    container_name: packetpulse-processing-service
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8002:8002"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC_PROCESSED=processed_packets
      - KAFKA_TOPIC_RAW=raw_packets
      - REDIS_URL=redis://redis:6379/0
      - HEALTH_PORT=8002
    restart: unless-stopped
    networks:
      - internal

  detection_service:
    build: ./services/detection_service
    container_name: packetpulse-detection-service
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8003:8003"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC_PROCESSED=processed_packets
      - KAFKA_TOPIC_ALERTS=alerts
      - REDIS_URL=redis://redis:6379/0
      - MODEL_PATH=./models
      - HEALTH_PORT=8003
    restart: unless-stopped
    networks:
      - internal

  api_gateway:
    build: ./services/api_gateway
    container_name: packetpulse-api-gateway
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_URL=postgresql+asyncpg://pp:pp_secret@postgres/packetpulse
      - ADMIN_SECRET=${ADMIN_SECRET:-change_me}
      - API_KEY=${API_KEY:-dev_key_12345}
      - HEALTH_PORT=8001
    restart: unless-stopped
    networks:
      - internal
      - frontend

  dashboard:
    build: ./dashboard
    container_name: packetpulse-dashboard
    depends_on:
      - api_gateway
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - frontend

# --------------------------------------------------------------------------
# Networks
# --------------------------------------------------------------------------
networks:
  internal:
    driver: bridge
  frontend:
    driver: bridge

# --------------------------------------------------------------------------
# Volumes
# --------------------------------------------------------------------------
volumes:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  pgdata:
